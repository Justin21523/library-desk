# LibraDesk application configuration.
# Loaded by com.justin.libradesk.config.AppConfig at startup.
# Every key can be overridden by an environment variable of the same name
# in UPPER_SNAKE_CASE (e.g. db.password -> DB_PASSWORD). Keep real
# credentials in the environment, not in this file.

# PostgreSQL connection (the database must already exist: createdb libradesk).
db.url=jdbc:postgresql://localhost:5432/libradesk
db.user=libradesk
db.password=libradesk

# HikariCP connection pool.
db.pool.maxSize=10
db.pool.minIdle=2

# Default loan period in days when issuing a new loan.
loan.period.days=14

# Borrowing limits per patron type.
borrow.limit.student=5
borrow.limit.staff=10
borrow.limit.public=3

# How often the background maintenance sweep runs, in minutes
# (marks overdue loans and expires stale READY reservations).
overdue.sweep.minutes=60

# Days a READY reservation is held before it expires and the next patron is promoted.
reservation.ready.expiry.days=3

# Fine charged per overdue day, and the unpaid total above which borrowing is
# blocked (0 = never block). fine.* are read as decimals and configured here.
fine.per.day=0.50
fine.block.threshold=0
