name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # ubuntu-latest runners have Docker preinstalled, so the Testcontainers
      # integration tests (-Pit) run here. AbstractRepositoryIT pins the Docker
      # API version, so no extra Docker configuration is needed.
      - name: Build and test (unit + integration)
        run: mvn -B verify -Pit
